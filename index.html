<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワード保護ページ</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #f4f4f7;
  }
  #lock-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 20px;
  }
  #lock-box {
    background: #fff;
    padding: 40px 32px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 320px;
    text-align: center;
  }
  #lock-box h2 {
    font-size: 18px;
    margin-bottom: 24px;
    color: #333;
  }
  #lock-box input {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
  }
  #lock-box button {
    width: 100%;
    padding: 10px;
    background: #333;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
  }
  #lock-box button:hover {
    background: #555;
  }
  #error-msg {
    color: #d33;
    font-size: 13px;
    margin-top: 12px;
    min-height: 16px;
  }
  #content {
    display: none;
  }
</style>
</head>
<body>

<div id="lock-screen">
  <div id="lock-box">
    <h2>このページはパスワードで保護されています</h2>
    <input type="text" id="username" placeholder="ユーザー名">
    <input type="password" id="password" placeholder="パスワード">
    <button onclick="checkLogin()">ログイン</button>
    <p id="error-msg"></p>
  </div>
</div>

<div id="content">
  <!-- ここに本来公開したいサイトの中身を書いてください -->
  <h1>ようこそ！</h1>
  <p>このページはログイン後のみ表示されます。</p>
</div>

<script>
  const VALID_USER = "kouhou";
  const VALID_PASS = "isf9hvba2";

  function checkLogin() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    if (user === VALID_USER && pass === VALID_PASS) {
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    } else {
      document.getElementById('error-msg').innerText = "ユーザー名またはパスワードが違います";
    }
  }

  // Enterキーでもログインできるようにする
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkLogin();
  });
</script>

</body>
</html>
